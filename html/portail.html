<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TDD Platform — Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-image: url('https://images.unsplash.com/photo-1509391366360-2e959784a276?w=1600&q=80');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body>
  <main class="relative min-h-screen flex items-center justify-center px-4">
    <div class="absolute inset-0 bg-slate-950/65"></div>

    <div class="relative z-10 w-full max-w-md px-4 py-10">
      <div class="bg-white/85 backdrop-blur rounded-[2rem] border border-white/50 shadow-2xl p-10">

        <div class="text-center mb-8">
          <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Accès réservé</p>
          <h1 class="mt-4 text-4xl font-semibold text-slate-950">Connexion</h1>
          <p class="mt-2 text-sm text-slate-600">Identifiant unique pris en charge pour le moment.</p>
        </div>

        <form action="dashboard.html" method="get" class="space-y-5">
          <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Identifiant</label>
            <input
              id="email"
              type="email"
              value="nicolas.clecoeur@gmail.com"
              readonly
              class="w-full rounded-2xl border border-slate-300 bg-slate-100 px-4 py-3 text-sm text-slate-800"
            />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-slate-700 mb-2">Mot de passe</label>
            <input
              id="password"
              type="password"
              required
              class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100"
              placeholder="Votre mot de passe"
            />
          </div>

          <button
            type="submit"
            class="w-full rounded-2xl bg-slate-950 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800"
          >
            Se connecter
          </button>
        </form>

      </div>
    </div>
  </main>
</body>
</html>
