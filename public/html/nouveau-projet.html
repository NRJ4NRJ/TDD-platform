<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TDD Platform — Nouveau projet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
    <div>
      <a href="dashboard.html" class="text-xl font-bold text-slate-900 hover:text-blue-700 transition-colors">TDD Platform</a>
      <p class="text-xs text-slate-500">Analyse des risques EnR</p>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-sm text-slate-600">nicolas.clecoeur@gmail.com</span>
      <a href="portail.html" class="text-sm text-slate-600 hover:text-red-600 transition-colors">Déconnexion</a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-6 py-10">

    <div class="mb-8">
      <a href="projets.html" class="text-sm text-slate-500 hover:text-blue-600 transition-colors">← Retour au portefeuille</a>
      <h1 class="text-2xl font-bold text-slate-900 mt-3">Nouveau projet</h1>
      <p class="text-sm text-slate-500 mt-1">Renseignez les informations de l'actif renouvelable.</p>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 p-8 space-y-6">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div class="sm:col-span-2">
          <label for="name" class="block text-sm font-medium text-slate-700 mb-2">Nom du projet *</label>
          <input id="name" type="text" required placeholder="ex. Projet Mimosa"
            class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100" />
        </div>

        <div>
          <label for="type" class="block text-sm font-medium text-slate-700 mb-2">Type *</label>
          <select id="type" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
            <option value="wind">Éolien</option>
            <option value="solar">Solaire</option>
            <option value="hydro">Hydraulique</option>
            <option value="storage">Stockage</option>
            <option value="other">Autre</option>
          </select>
        </div>

        <div>
          <label for="capacity" class="block text-sm font-medium text-slate-700 mb-2">Puissance (MW)</label>
          <input id="capacity" type="number" step="0.1" min="0" placeholder="ex. 12"
            class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100" />
        </div>

        <div>
          <label for="location" class="block text-sm font-medium text-slate-700 mb-2">Localisation</label>
          <input id="location" type="text" placeholder="ex. Normandie, France"
            class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100" />
        </div>

        <div>
          <label for="status" class="block text-sm font-medium text-slate-700 mb-2">Statut *</label>
          <select id="status" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
            <option value="development">Développement</option>
            <option value="construction">Construction</option>
            <option value="operation">Exploitation</option>
          </select>
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <a href="projets.html" class="rounded-xl border border-slate-300 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
          Annuler
        </a>
        <button type="submit" class="rounded-xl bg-blue-600 hover:bg-blue-700 px-5 py-2.5 text-sm font-semibold text-white transition-colors">
          Créer le projet
        </button>
      </div>

    </div>
  </main>
</body>
</html>
