<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TDD Platform — Importer rapport Excel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
    <div>
      <a href="dashboard.html" class="text-xl font-bold text-slate-900 hover:text-blue-700 transition-colors">TDD Platform</a>
      <p class="text-xs text-slate-500">Analyse des risques EnR</p>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-sm text-slate-600">nicolas.clecoeur@gmail.com</span>
      <a href="portail.html" class="text-sm text-slate-600 hover:text-red-600 transition-colors">Déconnexion</a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-6 py-10">

    <div class="mb-8">
      <a href="projets.html" class="text-sm text-slate-500 hover:text-blue-600 transition-colors">← Retour au portefeuille</a>
      <h1 class="text-2xl font-bold text-slate-900 mt-3">Importer un rapport Excel</h1>
      <p class="text-sm text-slate-500 mt-1">Chargez un fichier TDD au format .xlsx pour créer automatiquement un projet.</p>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 p-8 space-y-6">

      <label for="file-upload"
        class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors">
        <div class="text-4xl mb-3">📂</div>
        <p class="text-sm font-medium text-slate-700">Glissez votre fichier ici</p>
        <p class="text-xs text-slate-400 mt-1">ou cliquez pour sélectionner</p>
        <p class="text-xs text-slate-400 mt-1">.xlsx uniquement</p>
        <input id="file-upload" type="file" accept=".xlsx" class="hidden" />
      </label>

      <div class="flex justify-end gap-3">
        <a href="projets.html" class="rounded-xl border border-slate-300 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
          Annuler
        </a>
        <button type="button" class="rounded-xl bg-blue-600 hover:bg-blue-700 px-5 py-2.5 text-sm font-semibold text-white transition-colors">
          Importer
        </button>
      </div>

    </div>
  </main>
</body>
</html>
