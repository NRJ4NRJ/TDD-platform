<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TDD Platform — Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    body {
      background-image: url('/sun-sets-renewable-energy-futuristic-landscape-generated-by-ai.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>
  <main class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md px-4 py-10">
      <div class="bg-white/40 backdrop-blur-md rounded-[2rem] border border-white/30 shadow-2xl p-10">

        <div class="text-center mb-8">
          <h1 class="text-4xl font-semibold text-white drop-shadow">Connexion</h1>
          <p class="mt-2 text-sm text-white/80">Identifiant unique pris en charge pour le moment.</p>
        </div>

        <div id="error-box" class="hidden mb-4 rounded-2xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>

        <form id="login-form" class="space-y-5">
          <div>
            <label for="email" class="block text-sm font-medium text-white mb-2">Identifiant</label>
            <input
              id="email"
              type="email"
              value="nicolas.clecoeur@gmail.com"
              readonly
              class="w-full rounded-2xl border border-slate-300 bg-slate-100 px-4 py-3 text-sm text-slate-800"
            />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-white mb-2">Mot de passe</label>
            <input
              id="password"
              type="password"
              required
              class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100"
              placeholder="Votre mot de passe"
            />
          </div>

          <button
            id="submit-btn"
            type="submit"
            class="w-full rounded-2xl bg-slate-950 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:opacity-60 disabled:cursor-not-allowed"
          >
            Se connecter
          </button>
        </form>

      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://hftpeymwscjooqnigprc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmdHBleW13c2Nqb29xbmlncHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzA1MDcsImV4cCI6MjA5MjkwNjUwN30.Tk9hOJjpPsnVKb8K1mTHz8UdmSRtZjEelw6o3dV54wg';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Already logged in → go straight to dashboard
    client.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = '/dashboard';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorBox = document.getElementById('error-box');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Connexion…';
      errorBox.classList.add('hidden');

      const { error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        errorBox.textContent = error.message;
        errorBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      } else {
        window.location.href = '/dashboard';
      }
    });
  </script>
</body>
</html>
